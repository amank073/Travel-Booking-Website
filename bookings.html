<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            padding: 30px;
        }

        h1 {
            font-size: 32px;
            color: #ffa500;
            text-align: center;
            margin-bottom: 40px;
        }

        .booking-box {
            width: 280px;
            height: 280px;
            background: #fff3e6;
            border: 4px solid #ffa500;
            border-radius: 12px;
            padding: 20px;
            margin: 15px auto;
            font-size: 16px;
            overflow-y: auto;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        #bookingList {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            /* justify-content: center; */
        }
    </style>
</head>
<body>

<h1>Your Bookings</h1>

<div id="bookingList"></div>

<script src="app.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        loadBookings();
    });
</script>

</body>


</html>
